<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>注册</title>
    <link rel="stylesheet" type="text/css" href="css/style.css" />
</head>

<body>
    <header>
        <div class="header">
            <div class="header-top">
                <div class="logo">
                    <a href="http://www.zongheng.com/" target="blank">
                        <img src="img/logo.png">
                    </a>
                </div>
                <div class="action">
                    <a>已有账号？</a>
                    <a href="登录.html" target="blank" style="color: rgb(252, 4, 4);font-weight: bolder;">
                        登录
                    </a>
                </div>
            </div>
        </div>
    </header>
    <div class="zhuce">
        <div class="zhuce-left">
            <ul>
                <li>
                    <img src="img/纵横.jpg">
                </li>
            </ul>
        </div>
        <div class="zhuce-right">
            <form action="登录.html" method="post">
                <h1>注册</h1>
                <p>用户姓名:<input type="text" required></p>
                <p>用户密码:<input type="password" required></p>
                <p>确认密码:<input type="password" required></p>
                <p>电子邮件:<input type="email" required></p>
                <p>
                    用户类型:
                    <select>
                        <option value="0">请选择</option>
                        <option value="1">普通用户</option>
                        <option value="2">VIP用户</option>
                    </select>
                </p>
                <div class="sex">
                    用户性别:
                    <input id="man" type="radio" name="1">男
                    <input id="women" type="radio" name="1">女
                </div>
                <p>
                    出生日期:
                    <input type="date">
                </p>
                <p>
                    兴趣爱好:
                    <input type="checkbox">修仙
                    <input type="checkbox">玄幻
                    <input type="checkbox">武侠
                    <input type="checkbox">校园
                </p>
                <p style="text-align: center;">
                    <input type="submit" class="button" value="提交">
                    <input type="reset" class="button" value="重置">
                </p>
            </form>
        </div>
    </div>
    <footer>
        <p>
            <a href="# ">关于纵横</a>
            <a href="# ">帮助中心</a>
            <a href="# ">作者投稿</a>
        </p>
        <p>2021@杜某人</p>

</body>
<html>
